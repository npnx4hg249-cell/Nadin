[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# URL is overridden at runtime by alembic/env.py from app.core.config.settings
sqlalchemy.url = postgresql+asyncpg://nadin:nadin_pass@localhost:5432/nadin_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamingHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
